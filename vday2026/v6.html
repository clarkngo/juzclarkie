<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafting Juzclarkie Manor</title>
    <style>
        :root {
            --bp-blue: #0a192f;
            --bp-line: #1e3a8a;
            --bp-accent: #64ffda;
            --bp-text: #ccd6f6;
            --val-pink: #d63384;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bp-blue);
            color: var(--bp-text);
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #blueprint-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--bp-line) 1px, transparent 1px), linear-gradient(90deg, var(--bp-line) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: -1;
        }

        /* Room Sliding Animation */
        .room-slide {
            animation: slideInRight 1s ease-out forwards;
            opacity: 0;
        }
        @keyframes slideInRight {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .container { width: 90%; max-width: 600px; text-align: center; }
        .header { font-size: 1.4rem; letter-spacing: 4px; color: var(--bp-accent); text-transform: uppercase; margin-bottom: 20px; }

        /* Interactive Zone with Backgrounds */
        #interactive-room {
            display: none;
            position: relative;
            height: 400px;
            border: 3px solid var(--bp-accent);
            background-size: cover;
            background-position: center;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 255, 218, 0.2);
        }
        .gem, .special-key {
            position: absolute;
            cursor: pointer;
            filter: drop-shadow(0 0 10px white);
            transition: transform 0.2s;
        }
        .gem:hover, .special-key:hover { transform: scale(1.3); }

        /* Secret Room Styling */
        #secret-room {
            display: none;
            background: #ffffff;
            color: #333;
            padding: 40px 20px;
            border-radius: 5px;
            width: 100%;
            max-width: 500px;
            font-family: 'Georgia', serif;
            animation: fadeIn 1.5s;
        }
        .couple-img { width: 100%; border-radius: 5px; margin-bottom: 20px; }
        .val-title { color: var(--val-pink); font-size: 2.2rem; margin-bottom: 5px; }
        .val-food { font-size: 1.2rem; font-style: italic; margin: 10px 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .val-btn {
            background: #f06292;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<div id="blueprint-grid"></div>

<audio id="music-start" src="blue-prince-day-start.mp3"></audio>
<audio id="music-game" src="blue-prince-westwardly-winds.mp3" loop></audio>
<audio id="music-opalite" src="opalite.mp3" loop></audio>

<div class="container" id="game-ui">
    <div id="start-screen">
        <h1 class="header">Juzclarkie Manor</h1>
        <p>Architectural Draft: Valentine 2026</p>
        <button class="val-btn" style="background: var(--bp-accent); color: var(--bp-blue);" onclick="initManor()">Begin Draft</button>
    </div>

    <div id="interactive-room" class="room-slide">
        <div id="item-container"></div>
    </div>
    <p id="objective-text" style="margin-top: 15px; font-weight: bold; color: var(--bp-accent);"></p>
</div>

<div id="secret-room">
    <img src="valentine-photo.jpg" class="couple-img" alt="Valentine Photo">
    <h1 class="val-title">You Found the Secret Room!</h1>
    <p>Valentine's Day | Feb 14, 2026</p>
    <div class="val-food">Appetizer: French Onion Soup</div>
    <div class="val-food">Main: Mushroom Cream Pasta & Pan Seared Steak</div>
    <div class="val-food">Dessert: Pistachio Crepe, Cheesecake & Chocolates</div>
    <div class="val-food">Drink: Classic Milk Tea</div>
    <button class="val-btn" onclick="sayYes()">WILL YOU BE MY VALENTINE?</button>
    <h2 id="final-msg" style="display:none; color:var(--val-pink); margin-top:20px;">It's a date! 🥰</h2>
</div>

<script>
    const mStart = document.getElementById('music-start');
    const mGame = document.getElementById('music-game');
    const mOpalite = document.getElementById('music-opalite');
    const room = document.getElementById('interactive-room');
    const items = document.getElementById('item-container');
    const objText = document.getElementById('objective-text');

    let gemsFound = 0;

    function initManor() {
        document.getElementById('start-screen').style.display = 'none';
        room.style.display = 'block';
        
        // Sequence: Start sound, then game loop
        mStart.play();
        mStart.onended = () => mGame.play();

        enterLibrary();
    }

    function enterLibrary() {
        room.style.backgroundImage = "url('library.png')";
        objText.innerText = "Objective: Collect 5 Emerald Gems to draft the next floor.";
        items.innerHTML = '';
        for(let i=0; i<5; i++) {
            let g = document.createElement('span');
            g.className = 'gem';
            g.innerHTML = '💎';
            g.style.left = (Math.random() * 80 + 10) + '%';
            g.style.top = (Math.random() * 80 + 10) + '%';
            g.onclick = function() {
                this.remove();
                gemsFound++;
                if(gemsFound === 5) enterDining();
            };
            items.appendChild(g);
        }
    }

    function enterDining() {
        // Trigger slide animation again
        room.classList.remove('room-slide');
        void room.offsetWidth; // trigger reflow
        room.classList.add('room-slide');
        
        room.style.backgroundImage = "url('dining-room.png')";
        objText.innerText = "Objective: Locate the Silver Key to unlock Room 0214.";
        items.innerHTML = '<span class="special-key" onclick="unlockSecret()">🗝️</span>';
        
        const key = document.querySelector('.special-key');
        key.style.left = '50%';
        key.style.top = '50%';
    }

    function unlockSecret() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('secret-room').style.display = 'block';
        document.body.style.backgroundColor = '#ffffff';
        document.getElementById('blueprint-grid').style.display = 'none';
        
        mGame.pause();
        mOpalite.play();
    }

    function sayYes() {
        document.getElementById('final-msg').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d63384', '#ffffff'] });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room 0214: Juzclarkie Manor</title>
    <style>
        :root {
            --val-pink: #d63384;
            --val-sub: #ffb7c5;
            --door-color: #a80038; /* Deep Ruby Red */
            --door-accent: #ffd700; /* Rich Gold */
            --door-glow: #ff4d6d;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            /* align-items: flex-start ensures top of content is visible on scroll */
            align-items: flex-start; 
            min-height: 100vh;
            text-align: center;
            /* Enable scrolling for long menu content */
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 40px 0;
        }

        /* --- THE VALENTINE DOOR ENTRANCE --- */
        #door-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #2b0000;
            z-index: 100;
            display: flex;
            perspective: 2000px;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s 1s;
        }

        .door-wing {
            width: 50%;
            height: 100%;
            background-color: var(--door-color);
            border: 6px solid var(--door-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .door-left { 
            transform-origin: left; 
            border-radius: 10px 0 0 10px;
        }
        .door-right { 
            transform-origin: right; 
            border-radius: 0 10px 10px 0;
        }

        /* Heart Doorknobs */
        .door-wing::after {
            content: '❤';
            font-size: 35px;
            color: var(--door-color);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: var(--door-accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 20px var(--door-accent);
        }
        .door-left::after { right: 15px; }
        .door-right::after { left: 15px; }

        .door-label {
            color: var(--door-accent);
            font-family: 'Georgia', serif;
            font-size: 2.8rem;
            position: absolute;
            top: 15%;
            font-weight: bold;
            text-shadow: 0 0 15px var(--door-accent);
            z-index: 110;
            pointer-events: none;
        }

        /* Opening Animations */
        .open-left { transform: rotateY(-130deg); }
        .open-right { transform: rotateY(130deg); }
        .fade-out { opacity: 0; pointer-events: none; }

        /* --- SECRET ROOM CONTENT --- */
        #secret-room {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            opacity: 0;
            transition: opacity 1.5s 1.2s;
            margin: auto;
        }
        .visible { opacity: 1 !important; }

        .couple-photo { 
            width: 100%; 
            max-width: 450px;
            border-radius: 8px; 
            display: block;
            margin: 0 auto 40px auto; /* Centered */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        .val-header { color: var(--val-pink); font-size: 2.6rem; margin-bottom: 5px; font-weight: bold; }
        .val-date { font-family: 'Courier New', monospace; font-size: 1rem; margin-bottom: 45px; color: #777; }
        .val-label { text-transform: uppercase; color: var(--val-sub); font-size: 0.8rem; letter-spacing: 5px; margin-top: 30px; }
        .val-food { font-size: 1.5rem; font-style: italic; margin: 12px 0; color: #444; }
        .val-divider { width: 40%; height: 1px; background: #eee; margin: 25px auto; }
        
        .val-btn {
            background: #f06292;
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 40px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(240, 98, 146, 0.4);
        }
        .val-btn:hover { transform: scale(1.05); background: #ec407a; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<div id="door-overlay" onclick="openRoom()">
    <div class="door-label">ROOM 0214</div>
    <div id="left-wing" class="door-wing door-left"></div>
    <div id="right-wing" class="door-wing door-right"></div>
</div>

<audio id="audio-opalite" src="opalite.mp3" loop></audio>

<div id="secret-room">
    <img src="valentine-photo.jpg" class="couple-photo" alt="Justine and You">
    
    <h1 class="val-header">You Found the Secret Room!</h1>
    <p class="val-date">Valentine's Day | Feb 14, 2026</p>

    <p class="val-label">Appetizer</p>
    <p class="val-food">French Onion Soup</p>
    <div class="val-divider"></div>

    <p class="val-label">Main Entrees</p>
    <p class="val-food">Mushroom Cream Pasta &<br>Pan Seared Steak</p>
    <div class="val-divider"></div>

    <p class="val-label">Desserts</p>
    <p class="val-food">Pistachio Crepe, Cheesecake &<br>Chocolates</p>
    <div class="val-divider"></div>

    <p class="val-label">Drink</p>
    <p class="val-food">Classic Milk Tea</p>

    <button class="val-btn" id="accept-btn" onclick="sayYes()">WILL YOU BE MY VALENTINE?</button>
    <h2 id="final-yay" style="display:none; color: var(--val-pink); margin-top: 30px; font-size: 2.5rem;">It's a date! 🥰</h2>
</div>

<script>
    function openRoom() {
        // 1. Animate Doors
        document.getElementById('left-wing').classList.add('open-left');
        document.getElementById('right-wing').classList.add('open-right');
        
        // 2. Fade overlay
        document.getElementById('door-overlay').classList.add('fade-out');

        // 3. Play Taylor Swift's "Opalite" (2026 release)
        document.getElementById('audio-opalite').play();

        // 4. Show Content
        document.getElementById('secret-room').classList.add('visible');
    }

    function sayYes() {
        document.getElementById('accept-btn').style.display = 'none';
        document.getElementById('final-yay').style.display = 'block';
        
        // Confetti Celebration
        const duration = 5 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        const interval = setInterval(function() {
            const timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);

            const particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juzclarkie Manor: Floor 14 Drafting</title>
    <style>
        :root {
            --bp-blue: #0a192f;
            --bp-line: #1e3a8a;
            --bp-accent: #64ffda;
            --bp-text: #ccd6f6;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bp-blue);
            color: var(--bp-text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }
        #blueprint-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--bp-line) 1px, transparent 1px), linear-gradient(90deg, var(--bp-line) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: -1;
        }
        .card-container { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .room-card {
            border: 2px solid var(--bp-line);
            padding: 30px 15px;
            width: 130px;
            background: rgba(10, 25, 47, 0.9);
            cursor: pointer;
            text-align: center;
            opacity: 0;
            transform: translateX(-100px);
            transition: 0.3s;
        }
        .room-card.animate { animation: slideIn 0.6s ease-out forwards; }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
        .room-card:hover { border-color: var(--bp-accent); color: var(--bp-accent); box-shadow: 0 0 15px var(--bp-accent); }

        #interactive-display {
            display: none;
            position: relative;
            width: 500px;
            height: 350px;
            border: 3px solid var(--bp-accent);
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin: 20px auto; 
        }
        .gem { position: absolute; font-size: 2rem; cursor: pointer; filter: drop-shadow(0 0 5px white); }
        .silver-key { position: absolute; font-size: 3rem; cursor: pointer; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .hidden { display: none; }
        .error-shake { animation: shake 0.5s; color: #ff4d6d; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .btn { background: var(--bp-accent); color: var(--bp-blue); border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div id="blueprint-grid"></div>

<audio id="audio-start" src="blue-prince-day-start.mp3"></audio>
<audio id="audio-game" src="blue-prince-westwardly-winds.mp3" loop></audio>

<div id="game-container" style="text-align: center; width: 90%;">
    <div id="phase-start">
        <h1 style="letter-spacing: 8px; color: var(--bp-accent);">JUZCLARKIE MANOR</h1>
        <p>Architectural Authorization Required for Room 0214.</p>
        <button class="btn" onclick="startDrafting()">Initialize Draft</button>
    </div>

    <div id="phase-draft" class="hidden">
        <h2 id="draft-title" style="color: var(--bp-accent); text-transform: uppercase;">Draft 1: Archive Access</h2>
        <p id="clue-text">Clue: "Follow the scent of aged paper and silent stories."</p>
        <div class="card-container" id="card-box"></div>
    </div>

    <div id="phase-interactive" class="hidden">
        <h2 id="room-name" style="color: var(--bp-accent);">LIBRARY</h2>
        <p id="room-task">Collect 5 Gems to proceed.</p>
        <div id="interactive-display">
            <div id="item-layer"></div>
        </div>
        <p id="progress-count" style="margin-top: 15px;"></p>
    </div>
</div>

<script>
    const aStart = document.getElementById('audio-start');
    const aGame = document.getElementById('audio-game');
    let currentLevel = 1;
    let gemsFound = 0;

    const draftData = {
        1: { 
            title: "Floor 14: Archive Draft", 
            clue: "Clue: 'Follow the scent of aged paper... or perhaps follow the music?'", 
            rooms: [
                { name: "Dance Room", target: "dance" }, 
                { name: "Library", target: "correct" }, 
                { name: "Gallery", target: "wrong" }
            ] 
        },
        2: { 
            title: "Floor 14: Hall Draft", 
            clue: "Clue: 'A place for a feast that never ends.'", 
            rooms: [
                { name: "Dining Hall", target: "correct" }, 
                { name: "Workshop", target: "wrong" }, 
                { name: "Office", target: "wrong" }
            ] 
        }
    };

    function startDrafting() {
        document.getElementById('phase-start').classList.add('hidden');
        document.getElementById('phase-draft').classList.remove('hidden');
        aStart.play();
        aStart.onended = () => aGame.play();
        renderDraft();
    }

    function renderDraft() {
        const data = draftData[currentLevel];
        document.getElementById('draft-title').innerText = data.title;
        document.getElementById('clue-text').innerText = data.clue;
        document.getElementById('clue-text').classList.remove('error-shake');
        const box = document.getElementById('card-box');
        box.innerHTML = '';
        data.rooms.forEach((room, index) => {
            const card = document.createElement('div');
            card.className = 'room-card';
            card.innerText = room.name;
            card.style.animationDelay = `${index * 0.2}s`;
            card.onclick = () => handleChoice(room.target);
            box.appendChild(card);
            setTimeout(() => card.classList.add('animate'), 10);
        });
    }

    function handleChoice(target) {
        if (target === "dance") {
            window.location.href = 'dance-room.html';
        } else if (target === "correct") {
            if (currentLevel === 1) enterLibrary();
            else enterDining();
        } else {
            document.getElementById('clue-text').innerText = "DRAFT COLLAPSED: Restarting Floor 14...";
            document.getElementById('clue-text').classList.add('error-shake');
            currentLevel = 1;
            setTimeout(renderDraft, 1200);
        }
    }

    function enterLibrary() {
        document.getElementById('phase-draft').classList.add('hidden');
        document.getElementById('phase-interactive').classList.remove('hidden');
        const display = document.getElementById('interactive-display');
        display.style.display = 'block';
        display.style.backgroundImage = "url('library.png')";
        spawnGems();
    }

    function spawnGems() {
        const layer = document.getElementById('item-layer');
        layer.innerHTML = '';
        gemsFound = 0;
        document.getElementById('progress-count').innerText = `Gems: 0/5`;
        for(let i=0; i<5; i++) {
            const gem = document.createElement('span');
            gem.className = 'gem';
            gem.innerHTML = '💎';
            gem.style.left = Math.random() * 80 + 10 + '%';
            gem.style.top = Math.random() * 80 + 10 + '%';
            gem.onclick = function() {
                this.remove();
                gemsFound++;
                document.getElementById('progress-count').innerText = `Gems: ${gemsFound}/5`;
                if(gemsFound === 5) {
                    currentLevel = 2;
                    setTimeout(() => {
                        document.getElementById('phase-interactive').classList.add('hidden');
                        document.getElementById('phase-draft').classList.remove('hidden');
                        renderDraft();
                    }, 500);
                }
            };
            layer.appendChild(gem);
        }
    }

    function enterDining() {
        document.getElementById('phase-draft').classList.add('hidden');
        document.getElementById('phase-interactive').classList.remove('hidden');
        const display = document.getElementById('interactive-display');
        display.style.backgroundImage = "url('dining-room.png')";
        document.getElementById('room-name').innerText = "DINING HALL";
        document.getElementById('room-task').innerText = "Locate the Silver Key to unlock the secret path.";
        const layer = document.getElementById('item-layer');
        layer.innerHTML = '<span class="silver-key" onclick="unlockSecret()">🗝️</span>';
    }

    function unlockSecret() {
        window.location.href = 'secret-room.html';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clark's Corner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #07091c;
    color: #ede8dc;
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(139,92,246,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .wrap {
    position: relative;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .title { text-align: center; }
  .title h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c9a84c;
    text-shadow: 0 0 20px rgba(201,168,76,0.3);
    margin-bottom: 6px;
  }
  .title p {
    font-size: 0.85rem;
    font-style: italic;
    color: #6b7a9e;
    letter-spacing: 1px;
  }

  hr {
    width: 100%;
    border: none;
    border-top: 1px solid #1e2338;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .card {
    display: block;
    text-decoration: none;
    background: #0d1020;
    border: 1px solid #22283c;
    border-radius: 6px;
    padding: 18px 18px 14px;
    transition: border-color 0.25s, box-shadow 0.25s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .card:hover { border-color: #c9a84c; box-shadow: 0 0 20px rgba(201,168,76,0.08); }
  .card:hover::before { opacity: 1; }

  .card-icon { font-size: 1.6rem; margin-bottom: 8px; }
  .card-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #6b7a9e;
    margin-bottom: 4px;
  }
  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: #c9a84c;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 0.9rem;
    font-style: italic;
    font-weight: 300;
    color: #7a7464;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid #22283c;
    border-radius: 4px;
    color: #6b7a9e;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .copy-btn:hover { border-color: #c9a84c; color: #c9a84c; }
  .copy-btn.copied { border-color: #5a9e7a; color: #5a9e7a; }

  .footer {
    font-size: 0.7rem;
    font-style: italic;
    color: #2e3348;
    letter-spacing: 1px;
    text-align: center;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #5a9e7a;
    color: #07091c;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 100px;
    font-weight: 600;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">
    <h1>Clark's Corner</h1>
    <p>choose your adventure</p>
  </div>

  <hr>

  <div class="cards">
    <a class="card" href="./vday2026/index.html">
      <div class="card-icon">💌</div>
      <div class="card-label">Valentine's Day · 2026</div>
      <div class="card-title">A Love Letter</div>
      <div class="card-desc">Something made just for you, with all my heart.</div>
      <button class="copy-btn" onclick="copyLink(event, 'vday2026/index.html')">
        🔗 Copy Link
      </button>
    </a>

    <a class="card" href="./juzbday2026/index.html">
      <div class="card-icon">🖌️</div>
      <div class="card-label">Birthday Quest · 2026</div>
      <div class="card-title">Expedition 36</div>
      <div class="card-desc">Born past the Paintress's decree — your scavenger hunt awaits.</div>
      <button class="copy-btn" onclick="copyLink(event, 'juzbday2026/index.html')">
        🔗 Copy Link
      </button>
    </a>
  </div>

  <hr>
  <div class="footer">made with love · clark</div>
</div>

<div class="toast" id="toast">✓ Link Copied</div>

<script>
  function copyLink(e, path) {
    e.preventDefault();
    e.stopPropagation();

    const base = window.location.origin + window.location.pathname.replace(/\/?$/, '/');
    const url  = base + path;

    navigator.clipboard.writeText(url).then(() => {
      const btn = e.currentTarget;
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = '🔗 Copy Link';
        btn.classList.remove('copied');
      }, 2000);

      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    });
  }
</script>
</body>
</html>
